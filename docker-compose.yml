version: "3.9"

services:
  cv-sam-api:
    build: .
    ports:
      - "${HOST_PORT:-5201}:5201"
    environment:
      - CV_SAM_VARIANT=${CV_SAM_VARIANT:-vit_b}
      - MODEL_DIR=${MODEL_DIR:-/data/models/sam}
      - CV_SAM_IDLE_UNLOAD_SEC=${CV_SAM_IDLE_UNLOAD_SEC:-0}
      - CV_SAM_DEVICE=${CV_SAM_DEVICE:-auto}
    volumes:
      - "${MODELS_HOST_DIR:-/data/models}:/data/models"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5201/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
